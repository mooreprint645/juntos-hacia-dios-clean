<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Juntos Hacia Dios | Clean</title>
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --gold: #f6c453;
      --text: #ffffff;
      --muted: #b8b8b8;
      --border: rgba(255, 255, 255, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(246, 196, 83, 0.14), transparent 34rem),
        var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      width: min(920px, 100%);
      padding: 34px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: rgba(26, 29, 39, 0.88);
      box-shadow: 0 22px 55px rgba(0, 0, 0, 0.28);
      text-align: center;
    }

    .kicker {
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 1.8px;
      font-size: 0.82rem;
      font-weight: 900;
      margin-bottom: 14px;
    }

    h1 {
      color: var(--gold);
      font-size: clamp(2.2rem, 8vw, 4.2rem);
      line-height: 1;
      margin-bottom: 18px;
    }

    p {
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.7;
      max-width: 680px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <main>
    <p class="kicker">Nueva base limpia</p>
    <h1>Juntos Hacia Dios</h1>
    <p>
      Esta es la versión limpia inicial. Primero validamos que el nuevo repositorio y GitHub Pages funcionen correctamente; después reconstruimos la página completa por bloques.
    </p>
  </main>
</body>
</html>
